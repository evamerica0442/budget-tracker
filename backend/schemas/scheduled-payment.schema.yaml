# ──────────────────────────────────────────────────────────────────────────────
# Scheduled Payment Schema — YAML Definition
# South African Budget Tracker
# ──────────────────────────────────────────────────────────────────────────────
# This schema defines the structure for recurring/planned payments that the
# app tracks for budgeting, reminders, and reconciliation purposes.
#
# IMPORTANT: This app does NOT execute payments. Only the bank (via EFT,
# debit order, or API) executes the actual transfer. The app handles:
#   - Planning & scheduling
#   - Pre-due-date reminders
#   - Post-hoc reconciliation against imported bank transactions
# ──────────────────────────────────────────────────────────────────────────────

$schema: "http://json-schema.org/draft-07/schema#"
$id: "https://budget-tracker.app/schemas/scheduled-payment.yaml"
title: "Scheduled Payment"
description: "A planned recurring payment tracked for budgeting, reminders, and bank reconciliation"
type: object

# ── Required Fields ──────────────────────────────────────────────────────────
required:
  - name
  - amount
  - frequency
  - due_date
  - category

# ── Properties ───────────────────────────────────────────────────────────────
properties:
  id:
    type: string
    description: "Unique UUID v4 identifier for this scheduled payment"
    example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
    readOnly: true

  name:
    type: string
    description: "Human-readable label (e.g. 'Old Mutual RA Contribution')"
    minLength: 1
    maxLength: 128
    examples:
      - "Old Mutual RA"
      - "Momentum Medical Aid"
      - "Eskom Prepaid Electricity"
      - "FNB Home Loan Debit Order"

  amount:
    type: number
    description: "Payment amount in ZAR (minimum currency unit support via integer)"
    minimum: 0
    exclusiveMinimum: true
    examples: [4500.00, 1899.00, 750.00]

  currency:
    type: string
    description: "ISO 4217 currency code"
    default: "ZAR"
    enum: ["ZAR", "USD", "GBP", "EUR"]

  frequency:
    type: string
    description: "How often the payment occurs"
    enum:
      - once
      - daily
      - weekly
      - biweekly
      - monthly
      - quarterly
      - biannually
      - annually
    example: "monthly"

  due_date:
    type: string
    format: date
    description: "Next due date (ISO 8601 YYYY-MM-DD). Advances after reconciliation."
    example: "2026-07-01"

  end_date:
    type: string
    format: date
    description: "Optional end date for finite recurring payments (null = indefinite)"
    nullable: true
    example: "2030-12-31"

  category:
    type: string
    description: "Budget category for reporting"
    enum:
      - housing
      - utilities
      - insurance
      - medical_aid
      - retirement_annuity
      - investments
      - savings
      - debt_repayment
      - subscriptions
      - education
      - transport
      - food
      - entertainment
      - other
    example: "retirement_annuity"

  linked_account:
    type: string
    description: "Reference to the bank account this payment is linked to"
    default: ""
    example: "FNB-Cheque-123456789"

  status:
    type: string
    description: "Lifecycle state of the scheduled payment"
    enum: [active, paused, completed, cancelled, archived]
    default: active

  # ── Reminder Configuration ─────────────────────────────────────────────────
  reminders:
    type: object
    description: "Controls when and how reminders are sent before the due date"
    properties:
      days_before:
        type: array
        description: "Days before due_date to send a reminder"
        items:
          type: integer
          minimum: 0
        default: [7, 3, 1]
        example: [14, 7, 3, 1]
      channels:
        type: array
        description: "Delivery channels for reminders"
        items:
          type: string
          enum: [email, push, sms]
        default: ["email"]
      missed_alert:
        type: boolean
        description: "Send an alert if the due date passes without reconciliation"
        default: true

  # ── Reconciliation Rules ────────────────────────────────────────────────────
  reconciliation:
    type: object
    description: "Rules for auto-matching this scheduled payment against imported bank transactions"
    properties:
      match_strategy:
        type: string
        description: "Algorithm to identify matching bank transactions"
        enum: [description_contains, description_exact, amount_match, description_and_amount]
        default: description_and_amount
      match_text:
        type: string
        description: "Search text (substring) to find in transaction descriptions"
        default: ""
        example: "OLD MUTUAL"
      amount_tolerance:
        type: number
        description: "Allowed deviation in ZAR (e.g. 5.00 = ±R5)"
        minimum: 0
        default: 0
      reconciled_transaction_ids:
        type: array
        description: "IDs of bank transactions already matched (prevents double-reconciliation)"
        items:
          type: string
        default: []
      last_reconciled_date:
        type: string
        format: date-time
        description: "Timestamp of the most recent successful reconciliation"
        nullable: true
        default: null

  # ── Compliance ──────────────────────────────────────────────────────────────
  personal_data_consent_at:
    type: string
    format: date-time
    description: "POPIA: Timestamp when user consented to storing this payment's personal data"
    default: "2026-06-15T19:00:00.000Z"

  user:
    type: string
    description: "Firebase/Firestore user ID"
    example: "abc123user456"

  createdAt:
    type: string
    format: date-time
    description: "Record creation timestamp"
    readOnly: true

  updatedAt:
    type: string
    format: date-time
    description: "Record last-updated timestamp"
    readOnly: true